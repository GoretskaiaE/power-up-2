<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HR Dashboard Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  /* ============================================
     HR Dashboard Power-Up — Connector v5
  ============================================ */

  var BASE_URL = window.location.origin + window.location.pathname.replace('index.html', '');

  window.TrelloPowerUp.initialize(
    {
      // ── Board button ───────────────────────────────────────────
      'board-buttons': function(t, options) {
        return [{
          icon: BASE_URL + 'icon.svg',
          text: 'HR Dashboard',
          callback: function(t) {
            return t.modal({
              title:      'HR Dashboard v6',
              url:        BASE_URL + 'dashboard.html',
              height:     520,
              fullscreen: false
            });
          }
        }];
      },

      // ── Auth status ────────────────────────────────────────────
      // t.getRestApi() returns the object directly — no .then()
      'authorization-status': function(t, options) {
        return t.getRestApi().isAuthorized().then(function(isAuthorized) {
          return { authorized: isAuthorized };
        });
      },

      // ── Show authorization ─────────────────────────────────────
      'show-authorization': function(t, options) {
        return t.popup({
          title:  'Authorize HR Dashboard',
          url:    BASE_URL + 'authorize.html',
          height: 220
        });
      }
    },
    {
      appKey:  'd9abb67834303f2caf672c5c7bfb0347',
      appName: 'HR Dashboard 2.2'
    }
  );
</script>
</body>
</html>
